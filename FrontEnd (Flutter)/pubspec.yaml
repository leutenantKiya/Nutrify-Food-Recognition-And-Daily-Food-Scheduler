name: nutrify
description: "Aplikasi manajemen nutrisi dan diet harian berbasis Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  http: ^1.2.1
  http_parser: ^4.0.2
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  uuid: ^4.4.2
  flutter_dotenv: ^6.0.1
  camera: ^0.12.0+1
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
